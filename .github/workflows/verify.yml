name: Verify MittiGuard

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run deterministic safety and integration suite
        run: npm run check
      - name: Run one-command judge proof
        run: npm run verify:judge
      - name: Build deployment image
        run: docker build -t mittiguard:${{ github.sha }} .
